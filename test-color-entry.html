<!DOCTYPE html>
<html lang="en">
<head>

  <title>Ludo COLOR_ENTRY Runtime Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;

      max-width: 600px;

      width: 100%;
      border-collapse: collapse;

    }

      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #ddd;
