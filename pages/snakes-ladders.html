<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Games – Snakes &amp; Ladders</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="background:linear-gradient(135deg,#f0fdf4,#ecfdf5);min-height:100vh">

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div style="font-size:3rem;margin-bottom:12px">🐍🪜</div>
    <div class="spinner"></div>
    <div class="loading-title">Snakes &amp; Ladders</div>
  </div>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html"><span class="logo-emoji">🎮</span> Happy Games</a>
  <div class="nav-links">
    <span class="nav-user" id="nav-username" style="display:none">👤</span>
    <a href="../login.html" class="btn btn-secondary" id="nav-login-btn" style="font-size:.85rem">🔑 Login</a>
    <a href="../index.html" class="btn btn-secondary" style="font-size:.85rem">🏠 Home</a>
    <button class="btn btn-outline" id="nav-logout-btn" style="display:none;font-size:.85rem" onclick="logout()">🚪 Logout</button>
  </div>
</nav>

<!-- Main layout -->
<div class="sl-page">

  <!-- Status bar -->
  <div class="sl-top">
    <div class="sl-players-bar">
      <div class="sl-player-card" id="sl-pc-you">
        <span class="sl-piece-big">🔵</span>
        <span class="sl-pc-label">You</span>
      </div>
      <div class="sl-dice-area">
        <div class="sl-dice" id="sl-dice-val">🎲</div>
        <button class="btn btn-primary btn-lg sl-roll-btn" id="sl-roll-btn" onclick="SnakesLadders.rollDice()">
          Roll Dice 🎲
        </button>
      </div>
      <div class="sl-player-card" id="sl-pc-comp">
        <span class="sl-piece-big">🔴</span>
        <span class="sl-pc-label">Computer</span>
      </div>
    </div>
    <div class="sl-status" id="sl-status">Loading…</div>
  </div>

  <!-- Game board (10×10 CSS grid) -->
  <div class="sl-board" id="sl-board"></div>

  <!-- Legend -->
  <div class="sl-legend">
    <span><span class="sl-leg-snake">🐍</span> Snake = go down</span>
    <span><span class="sl-leg-ladder">🪜</span> Ladder = go up</span>
    <span>🔵 You &nbsp; 🔴 Computer</span>
  </div>

</div>

<!-- End-game overlay -->
<div class="sl-end-overlay" id="sl-end" style="display:none">
  <div class="sl-end-card">
    <div class="sl-end-icon" id="sl-end-icon">🏆</div>
    <div class="sl-end-title" id="sl-end-title">You Win!</div>
    <div class="sl-end-msg" id="sl-end-msg"></div>
    <div class="sl-end-stats" id="sl-end-stats"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
      <button class="btn btn-primary btn-lg" onclick="SnakesLadders.restartGame()">🔄 Play Again</button>
      <a href="../index.html" class="btn btn-secondary">🏠 Home</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/snakes-ladders.js"></script>
<script>
softAuth(() => { SnakesLadders.init(); });
</script>
</body>
</html>
